steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/internal-sandbox-446612/ecs-to-cloudrun-registry/ecs-to-cloudrun-app:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/internal-sandbox-446612/ecs-to-cloudrun-registry/ecs-to-cloudrun-app:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'ecs-to-cloudrun-service'
      - '--image=us-central1-docker.pkg.dev/internal-sandbox-446612/ecs-to-cloudrun-registry/ecs-to-cloudrun-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/internal-sandbox-446612/ecs-to-cloudrun-registry/ecs-to-cloudrun-app:$COMMIT_SHA'
